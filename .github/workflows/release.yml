name: Release

on:
  push:
    branches: [main, develop]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.1'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install semantic-release
        run: |
          npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release

      - name: Update install.sh (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          # Get the latest release version
          LATEST_VERSION=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          
          # Update install.sh with latest version
          if [ -f "install.sh" ]; then
            sed -i "s/VERSION=.*/VERSION=\"$LATEST_VERSION\"/" install.sh
            
            # Commit updated install.sh
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add install.sh
            git commit -m "chore: update install.sh to version $LATEST_VERSION" || exit 0
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}