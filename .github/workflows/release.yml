name: Release

on:
  push:
    branches: [main, develop]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.1'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install semantic-release
        run: |
          npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # Production release - use semantic-release to determine version
            echo "branch=main" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            # Development release - use semantic pre-release versioning  
            COMMIT_COUNT=$(git rev-list --count HEAD)
            MINOR=$((COMMIT_COUNT / 10))
            PATCH=$((COMMIT_COUNT % 10))
            VERSION="0.${MINOR}.${PATCH}-beta"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "branch=develop" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Run semantic-release (main branch only)
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release

      - name: Build and release (develop branch)
        if: github.ref == 'refs/heads/develop'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          
          echo "Building develop release:"
          echo "  Version: $VERSION"
          echo "  Commit: $COMMIT"
          echo "  Build Time: $BUILD_TIME"
          
          # Build binary
          LDFLAGS="-X main.Version=$VERSION -X main.Commit=$COMMIT -X main.BuildTime=$BUILD_TIME"
          mkdir -p bin
          go build -ldflags "$LDFLAGS" -o bin/dockdockgo main.go
          
          # Create tarball
          tar -czf dockdockgo-linux-amd64.tar.gz -C bin dockdockgo
          
          # Create or update pre-release
          gh release delete "$VERSION" --yes || true
          gh release create "$VERSION" \
            --title "DockDockGo $VERSION" \
            --notes "Development release from develop branch" \
            --prerelease \
            dockdockgo-linux-amd64.tar.gz

      - name: Update install.sh (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          # Get the latest release version
          LATEST_VERSION=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          
          # Update install.sh with latest version
          if [ -f "install.sh" ]; then
            sed -i "s/VERSION=.*/VERSION=\"$LATEST_VERSION\"/" install.sh
            
            # Commit updated install.sh
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add install.sh
            git commit -m "chore: update install.sh to version $LATEST_VERSION" || exit 0
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}